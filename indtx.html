<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전형민 ♥ 조수정 청첩장</title>
  <style>
    body {
      font-family: 'Noto Serif KR', serif;
      background: #f9f4f2; /* 베이지톤 배경 */
      color: #4a3c3a;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 60px 20px;
      background: #f2e1dc; /* 채도 낮은 핑크 */
    }
    h1 {
      font-size: 2.5em;
      color: #a67c7c; /* 포인트 핑크 */
      margin: 0;
    }
    .info {
      margin: 40px;
      font-size: 1.2em;
      line-height: 1.8em;
    }
    .photo {
      margin: 20px;
    }
    .map {
      margin: 30px auto;
      width: 90%;
      max-width: 600px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: #a67c7c;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    footer {
      margin: 40px;
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>우리의 특별한 날 💍</h1>
  </header>

  <section class="info">
    <p>🤵 전형민 & 👰 조수정</p>
    <p>📅 2026년 11월 15일 (일) 오후 2시</p>
    <p>📍 수성호텔 2층 아이비홀</p>
  </section>

  <div class="photo">
    <img src="photo.jpg" alt="커플사진" width="300">
  </div>

  <div class="map">
    <!-- 구글 지도 iframe 삽입 -->
    <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="300" style="border:0;" allowfullscreen></iframe>
  </div>

  <a href="https://forms.gle/RSVP링크" class="btn">참석 여부 알려주세요</a>

  <footer>
    💌 연락처: 010-1234-5678 | 💳 계좌: 국민은행 123-456-7890
  </footer>
</body>
</html>
